<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Duet</title>
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="img/ico.png">
</head>

<body>
    <div id="main-menu" class="menu-overlay">
        <div class="menu-content">
            <h1>D&D Duet</h1>
            <button onclick="newGame()">Nueva Aventura</button>
            <button onclick="loadGame()">Cargar Partida</button>
            <div style="margin-top:20px;">
                <label>Destino:</label>
                <select id="menu-mission-select">
                    <option value="Novato 1">El Rescate del Cachorro Alado</option>
                    <option value="Novato 2">El Baile de las Sombras Gemelas</option>
                    <option value="Novato 3">La Pócima de la Risa</option>
                </select>
            </div>
        </div>
    </div>

    <div id="contenedor-juego" class="game-layout" style="display: none;">
        <nav id="game-nav">
            <button onclick="saveGame()">💾 Guardar</button>
            <button onclick="irAlMenu()">🏠 Menú</button>
        </nav>

        <div class="main-content">
            <aside class="panel-heroes">
                <h3>Héroes</h3>
                <div class="hero-card"><strong>🧙‍♀️ Maga</strong><br>HP: <input type="number" value="15" style="width:40px"></div>
                <div class="hero-card"><strong>🛡️ Caballero</strong><br>HP: <input type="number" value="20" style="width:40px"></div>
            </aside>

            <main class="panel-aventura">
                <div id="chat-output"></div>
                
                <div id="deck-area" style="text-align:center">
                    <div id="deck" onclick="drawCard()">TAP EVENTO</div>
                    <div id="card-display" style="display:none; background:#fdf5e6; padding:15px; border:2px solid #8b4513">
                        <h3 id="event-title"></h3>
                        <p id="event-desc"></p>
                        <button onclick="resetDeck()">Cerrar</button>
                    </div>
                </div>

                <div class="input-area">
                    <input type="text" id="user-input" placeholder="¿Qué haces ahora?">
                    <button onclick="enviarAccion()">Enviar</button>
                </div>
            </main>

            <aside class="panel-dados">
                <h3>Dados</h3>
                <div id="result" style="font-size:3rem; text-align:center; color:#8b4513">--</div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:5px">
                    <button onclick="rollDice(4)">d4</button>
                    <button onclick="rollDice(20)" style="background:#d4af37">d20</button>
                </div>
            </aside>
        </div>
    </div>

    <audio id="musica-ambiental" loop></audio>
    <script type="module" src="logic.js"></script>
</body>

</html>
