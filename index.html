<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Duet</title>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#8b4513">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="img/ico.png">
</head>

<body>
    <div class="audio-controls">
        <button id="btn-mute" onclick="toggleMute()">🔊</button>
        <input type="range" id="volumen-slider" min="0" max="1" step="0.1" value="0.5" oninput="ajustarVolumen(this.value)">
    </div>

    <div id="main-menu" class="menu-overlay">
        <div class="menu-content">
            <h1>D&D Duet</h1>
            <button onclick="newGame()">Nueva Aventura</button>
            <button onclick="loadGame()">Cargar Partida</button><br>
            <div class="mission-selector-menu">
                <label>Seleccionar Destino:</label><br>
                <select id="menu-mission-select">
                    <option value="Novato 1">El Rescate del Cachorro Alado</option>
                    <option value="Novato 2">El Baile de las Sombras Gemelas</option>
                    <option value="Novato 3">La Pócima de la Risa</option>
                    <option value="Intermedio 4">El Juicio de los Espejos</option>
                    <option value="Intermedio 5">El Laberinto de los Suspiros</option>
                    <option value="Intermedio 6">La Boda del Dragón</option>
                </select>
            </div>
        </div>
    </div>

    <div class="game-container" id="contenedor-juego" style="display: none;">
        <nav id="game-nav">
            <button onclick="saveGame()">💾 Guardar</button>
            <button onclick="loadGame()">📂 Cargar</button>
            <button onclick="irAlMenu()">🏠 Menú Principal</button>
        </nav>

        <div class="layout-flex">
            <aside class="heroes-panel">
                <h3>Héroes</h3>
                </aside>

            <main>
                <div id="pantalla-juego">
                    <div id="chat-output">Esperando al narrador...</div>
                </div>

                <div id="deck-container">
                    <div id="deck" onclick="drawCard()"><span>TAP PARA ROBAR EVENTO</span></div>
                    <div id="card-display" style="display:none;">
                        <h4 id="event-type"></h4>
                        <h3 id="event-title"></h3>
                        <p id="event-desc"></p>
                        <button onclick="resetDeck()">Reiniciar Mazo</button>
                    </div>
                </div>

                <div class="chat-input-container">
                    <input type="text" id="user-input" placeholder="Dime qué sigue...">
                    <button onclick="enviarAccion()">Enviar</button>
                </div>
            </main>

            <aside class="dice-panel">
                <h3>Dados</h3>
                <div id="result" class="result-display">--</div>
                <div class="button-grid">
                    <button onclick="rollDice(4)">d4</button>
                    <button onclick="rollDice(20)" style="background: #d4af37;">d20</button>
                </div>
            </aside>
        </div>
    </div>

    <audio id="musica-ambiental" src="snd/bgmusic.mp3" loop></audio>
    <audio id="audio-dados" src="snd/dado1.mp3"></audio>
    <script type="module" src="logic.js?v=12"></script>
</body>

</html>
