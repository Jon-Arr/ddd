<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>D&D Duet</title>
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Lora:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="img/ico.png">
</head>

<body>
    <div class="audio-controls">
        <button id="btn-mute" onclick="toggleMute()">🔊</button>
        <input type="range" id="volumen-slider" min="0" max="1" step="0.1" value="0.5" oninput="ajustarVolumen(this.value)">
    </div>

    <div id="main-menu" class="menu-overlay">
        <div class="menu-content">
            <h1>D&D Duet</h1>
            <button onclick="newGame()">Nueva Aventura</button>
            <button onclick="loadGame()">Cargar Partida</button>
            <div class="mission-selector-menu">
                <label>Seleccionar Destino:</label>
                <select id="menu-mission-select">
                    <option value="Novato 1">El Rescate del Cachorro Alado</option>
                    <option value="Novato 2">El Baile de las Sombras Gemelas</option>
                    <option value="Novato 3">La Pócima de la Risa</option>
                    <option value="Intermedio 4">El Juicio de los Espejos</option>
                    <option value="Intermedio 5">El Laberinto de los Suspiros</option>
                    <option value="Intermedio 6">La Boda del Dragón</option>
                </select>
            </div>
        </div>
    </div>

    <div id="contenedor-juego" class="game-layout" style="display: none;">
        <nav id="game-nav">
            <button class="nav-btn" onclick="saveGame()">💾 Guardar</button>
            <button class="nav-btn" onclick="loadGame()">📂 Cargar</button>
            <button class="nav-btn" onclick="irAlMenu()">🏠 Menú</button>
        </nav>

        <div class="main-content">
            <aside class="panel-heroes">
                <h3>Héroes</h3>
                <div class="hero-card"><strong>🧙‍♀️ Maga</strong><p>HP: 15</p></div>
                <div class="hero-card"><strong>🛡️ Caballero</strong><p>HP: 20</p></div>
            </aside>

            <main class="panel-aventura">
                <div id="chat-output"></div>
                
                <div id="deck-area">
                    <div id="deck" onclick="drawCard()"><span>TAP EVENTO</span></div>
                    <div id="card-display" style="display:none;">
                        <h3 id="event-title"></h3>
                        <p id="event-desc"></p>
                        <button onclick="resetDeck()">Reiniciar</button>
                    </div>
                </div>

                <div class="input-area">
                    <input type="text" id="user-input" placeholder="¿Qué haces ahora?">
                    <button onclick="enviarAccion()">Enviar</button>
                </div>
            </main>

            <aside class="panel-dados">
                <h3>Dados</h3>
                <div id="result" class="result-display">--</div>
                <div class="button-grid">
                    <button onclick="rollDice(4)">d4</button>
                    <button onclick="rollDice(20)" style="background:#d4af37; font-weight: bold;">d20</button>
                </div>
            </aside>
        </div>
    </div>

    <audio id="musica-ambiental" loop></audio>
    <audio id="audio-dados" src="snd/dado1.mp3"></audio>
    <script type="module" src="logic.js"></script>
</body>

</html>
