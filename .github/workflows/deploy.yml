name: Deploy con API Key Segura
on:
  push:
    branches: [ main ]
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/actions-checkout@v3

      - name: Inyectar API Key
        run: |
          sed -i "s/REPLACE_WITH_API_KEY/${{ secrets.GEMINI_API_KEY }}/g" logic.js

      - name: Deploy a GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # Sube la raíz del proyecto
          branch: gh-pages # Crea una rama especial para la web